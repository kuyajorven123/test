<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layout/main-layout}" lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee List</title>
</head>

<body>
  <div layout:fragment="content">
    <!-- Alerts -->
    <div th:if="${param.error}" class="alert alert-danger">
      Email Already Exist!
      <button type="button" class="close" data-dismiss="alert">&times;</button>
    </div>

    <div th:if="${param.success}" class="alert alert-success">
      Admin Successfully Created!
      <button type="button" class="close" data-dismiss="alert">&times;</button>
    </div>

    <div th:if="${param.update_success}" class="alert alert-success">
      Admin Successfully Updated!
      <button type="button" class="close" data-dismiss="alert">&times;</button>
    </div>

    <div th:if="${delete_success}" class="alert alert-success">
      Employee Deleted Successfully!
      <button type="button" class="close" data-dismiss="alert">&times;</button>
    </div>
    <!-- /Alerts -->

    <h1 style="font-size: xx-large;">Admin</h1>
    <div class="card">
      <div class="card-header">
        <button class="btn btn-sm btn-primary" data-toggle="modal" data-target="#modal-add"><i class="fas fa-plus"></i>
          Add Admin</button>
      </div>
      <!-- /.card-header -->
      <div class="card-body">
        <table id="example1" class="table table-bordered table-striped">
          <thead>
            <tr>
              <th>First Name</th>
              <th>Middle Name</th>
              <th>Lastname</th>
              <th>Position</th>
              <th>Email</th>
              <th>Address</th>
              <th>Birthday</th>
              <th>Role</th>
              <th>Tools</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="users : ${user}">
              <td th:text="${users.firstname}"></td>
              <td th:text="${users.middlename}"></td>
              <td th:text="${users.lastname}"></td>
              <td th:text="${users.position}"></td>
              <td th:text="${users.email}"></td>
              <td th:text="${users.address}"></td>
              <td th:text="${#temporals.format(users.birthday, 'MMMM dd, yyyy')}"></td>
              <td th:text="${users.role}"></td>
              <td>
                <button class="btn btn-sm btn-success"><i class="fas fa-edit"></i> Edit</button>
                <button class="btn btn-sm btn-danger"><i class="fas fa-trash"></i> Delete</button>
              </td>
            </tr>
            </tfoot>
        </table>
      </div>
      <!-- /.card-body -->
    </div>

    <!-- Add Admin Modal -->
    <div class="modal fade" id="modal-add">
      <div class="modal-dialog modal-xl">
        <div class="modal-content">
          <div class="modal-header">
            <h4 class="modal-title">Add Admin</h4>
            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <div class="modal-body">
            <form th:action="@{/create_admin}" method="post">
              <div class="card-body">
                <div class="row">
                  <div class="col-md-6">
                    <div class="form-group">
                      <!-- Column 1 -->
                      <label for="firstname">First Name</label>
                      <input type="text" class="form-control" name="firstname" placeholder="Enter first name" required>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="form-group">
                      <!-- Column 2  -->
                      <label for="middlename">Middle Name</label>
                      <input type="text" class="form-control" name="middlename" placeholder="Enter middle name"
                        required>
                    </div>
                  </div>
                </div>

                <div class="row">
                  <div class="col-md-6">
                    <div class="form-group">
                      <label for="lastname">Last Name</label>
                      <input type="text" class="form-control" name="lastname" placeholder="Enter last name" required>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="form-group">
                      <label for="address">Address</label>
                      <input type="text" class="form-control" name="address" placeholder="Enter address" required>
                    </div>
                  </div>
                </div>

                <div class="row">
                  <div class="col-md-6">
                    <div class="form-group">
                      <label for="birthday">Birthday</label>
                      <input type="date" class="form-control" name="birthday">
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="form-group">
                      <label for="position">Position</label>
                      <input type="text" class="form-control" name="position" placeholder="Enter position" required>
                    </div>
                  </div>
                </div>

                <div class="row">
                  <div class="col-md-6">
                    <div class="form-group">
                      <label for="email">Email address</label>
                      <input type="email" class="form-control" name="email" placeholder="Enter email" required>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="form-group">
                      <label for="password">Password</label>
                      <input type="password" class="form-control" name="password" placeholder="Enter password" required>
                    </div>
                  </div>
                </div>

              </div>
          </div>
          <div class="modal-footer justify-content-between">
            <button type="button" class="btn btn-default" data-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary">Save</button>
          </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
